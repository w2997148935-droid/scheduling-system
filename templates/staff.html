<!DOCTYPE html>
<html>
<head>
    <title>员工中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .schedule-table {width:100%;border-collapse:collapse;table-layout:fixed;}
        .schedule-table th,.schedule-table td {border:1px solid #ddd;padding:6px;text-align:center;}
        .schedule-table th {background:#0d6efd;color:white;}
        .time-col {background:#f8f9fa;font-weight:bold;}
        .schedule-cell {cursor:pointer;}
        .schedule-cell.selected {background:#198754;color:white;}
    </style>
</head>
<body class="container mt-3">
    <div class="d-flex justify-content-between">
        <h4>{{ current_user.name }} - 员工中心</h4>
        <a href="/logout" class="btn btn-danger btn-sm">退出</a>
    </div>

    {% with messages = get_flashed_messages() %}
        {% for msg in messages %}<div class="alert alert-info mt-2">{{ msg }}</div>{% endfor %}
    {% endwith %}

    <!-- 选班意向（多选） -->
    <div class="card mt-3">
        <div class="card-header bg-success text-white">多选选班（提交意向）</div>
        <div class="card-body overflow-auto">
            <table class="schedule-table">
                <thead>
                    <tr><th>时段</th>{% for d in dates %}<th>{{ d }}</th>{% endfor %}</tr>
                </thead>
                <tbody>
                    {% for slot in range(1,7) %}
                    <tr>
                        <td class="time-col">第{{ slot }}节</td>
                        {% for d in dates %}
                        <td class="schedule-cell" data-date="{{ d }}" data-slot="{{ slot }}">可选</td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <div class="card-footer">
            <form id="selectForm" method="POST" action="/submit_request">
                <input type="hidden" name="type" value="选班">
                <input type="hidden" id="selected_data" name="selected_data">
                <button class="btn btn-success w-100">提交选班意向</button>
            </form>
        </div>
    </div>
    
    <!-- 请假/换班申请卡片 -->
<div class="card mt-3">
    <!-- 卡片头部：黄色背景，深色文字 -->
    <div class="card-header bg-warning text-dark">请假/换班（需审批）</div>
    <!-- 卡片主体 -->
    <div class="card-body">
        <!-- 申请提交表单，POST提交 -->
        <form method="POST" action="/submit_request">
            <!-- 选择申请类型：请假/换班 -->
            <select name="type" id="req_type" class="form-control mb-2" required>
                <option value="">请选择</option>
                <option value="请假">请假</option>
                <option value="换班">换班</option>
            </select>

            <!-- 选择要操作的班次（自动同步最新排班） -->
            <select name="schedule_id" id="schedule_select" class="form-control mb-2" required>
                <option value="">我的班次</option>
                <!-- 循环展示当前用户的所有班次（新排班自动同步） -->
                {% for s in my_schedules %}
                <option value="{{ s.id }}" data-date="{{ s.date }}" data-slot="{{ s.slot }}">
                    {{ s.date }} 第{{ s.slot }}节
                </option>
                {% endfor %}
            </select>

            <!-- 选择可换班员工（选择换班时才显示） -->
            <select name="target_uid" id="target_user" class="form-control mb-2" style="display:none;">
                <option value="">选择可换班员工</option>
                <!-- 由JS自动加载符合条件的员工 -->
            </select>

            <!-- 申请理由输入框 -->
            <textarea name="reason" class="form-control mb-2" placeholder="理由" required></textarea>
            <!-- 提交申请按钮 -->
            <button class="btn btn-primary w-100">提交申请</button>
        </form>
    </div>
</div>

<script>
// 加载所有数据（由后台传入）
const allIntents = [
    {% for i in all_intents %}
    { user_id: "{{ i.user_id }}", date: "{{ i.date }}", slot: "{{ i.slot }}" }{% if not loop.last %},{% endif %}
    {% endfor %}
];

const allSchedules = [
    {% for s in all_schedules %}
    { user_id: "{{ s.user_id }}", date: "{{ s.date }}", slot: "{{ s.slot }}" }{% if not loop.last %},{% endif %}
    {% endfor %}
];

// 切换类型
document.getElementById('req_type').addEventListener('change', function () {
    const targetBox = document.getElementById('target_user');
    if (this.value === '换班') {
        targetBox.style.display = 'block';
        refreshList();
    } else {
        targetBox.style.display = 'none';
    }
});

// 切换班次时刷新
document.getElementById('schedule_select').addEventListener('change', function () {
    if (document.getElementById('req_type').value === '换班') {
        refreshList();
    }
});

// 核心筛选函数
function refreshList() {
    const sel = document.getElementById('schedule_select');
    if (!sel.value) return;

    const opt = sel.selectedOptions[0];
    const date = opt.dataset.date;
    const slot = opt.dataset.slot;
    const targetSel = document.getElementById('target_user');
    targetSel.innerHTML = '<option value="">选择可换班员工</option>';

    // 规则：有意向 & 未排班 & 不是自己
    const candidateIds = {};

    // 1. 找出该时段有意向的人
    allIntents.forEach(i => {
        if (i.date === date && i.slot === slot && i.user_id != "{{ current_user.id }}") {
            candidateIds[i.user_id] = true;
        }
    });

    // 2. 排除已排班的人
    allSchedules.forEach(s => {
        if (s.date === date && s.slot === slot) {
            delete candidateIds[s.user_id];
        }
    });

    // 3. 显示到下拉框
    {% for u in all_users %}
    if (candidateIds["{{ u.id }}"]) {
        const op = document.createElement("option");
        op.value = "{{ u.id }}";
        op.textContent = "{{ u.name }}";
        targetSel.appendChild(op);
    }
    {% endfor %}
}
</script>
    
    <script>
    // 修复多选+表单提交，唯一修改的脚本
    let selectedItems = [];
    document.querySelectorAll('.schedule-cell').forEach(cell => {
        cell.addEventListener('click', function() {
            const date = this.dataset.date;
            const slot = this.dataset.slot;
            const key = `${date}_${slot}`;
            
            // 切换选中样式
            this.classList.toggle('selected');
            
            // 更新选中数组
            const index = selectedItems.findIndex(i => i.key === key);
            if (index > -1) {
                selectedItems.splice(index, 1);
            } else {
                selectedItems.push({ key, date, slot });
            }
            
            // 赋值到表单隐藏域
            document.getElementById('selected_data').value = JSON.stringify(selectedItems);
        });
    });

    // 提交校验
    document.getElementById('selectForm').addEventListener('submit', function(e) {
        if (selectedItems.length === 0) {
            alert('请选择至少一个班次！');
            e.preventDefault();
        }
    });
</script>
</body>
</html>
