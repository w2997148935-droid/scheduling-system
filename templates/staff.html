<!DOCTYPE html>
<html>
<head>
    <title>员工中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1.min.js"></script>
</head>
<body class="container mt-3">
    <div class="d-flex justify-content-between">
        <h3>您好，{{ current_user.name }}</h3>
        <a href="/logout" class="btn btn-danger">退出登录</a>
    </div>
    <hr>
    <!-- 空闲时间提交（日历表格：日期表头+6时段） -->
    <h5>📅 空闲时间选择（勾选=空闲）</h5>
    <div class="table-responsive">
        <table class="table table-bordered text-center">
            <thead>
                <tr>
                    <th>时段</th>
                    {% for d in dates %}<th>{{ d }}</th>{% endfor %}
                </tr>
            </thead>
            <tbody>
                {% for slot in slots %}
                <tr>
                    <td>时段{{ slot }}</td>
                    {% for d in dates %}
                    <td>
                        <input type="checkbox" class="free-checkbox" 
                               data-date="{{ d }}" data-slot="{{ slot }}"
                               {% if (d, slot) in free_data and free_data[(d, slot)] %}checked{% endif %}>
                    </td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <hr>
    <!-- 换班/请假申请 -->
    <h5>📝 换班/请假申请</h5>
    <form method="post" action="/submit_request">
        <select name="schedule_id" class="form-select mb-2" required>
            {% for s in schedules %}<option value="{{ s.id }}">{{ s.date }} 时段{{ s.slot }}</option>{% endfor %}
        </select>
        <select name="type" class="form-select mb-2">
            <option value="换班">换班</option>
            <option value="请假">请假</option>
        </select>
        <button class="btn btn-warning">提交申请</button>
    </form>
    <script>
        // 提交空闲时间
        $('.free-checkbox').change(function(){
            $.post('/submit_free', JSON.stringify({
                date: $(this).data('date'),
                slot: $(this).data('slot'),
                is_free: $(this).is(':checked')
            }));
        });
    </script>
</body>
</html>
