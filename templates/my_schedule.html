<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>我的班次</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h4>📅 我的排班班次</h4>
    <a href="/staff" class="btn btn-secondary btn-sm mb-3">返回员工中心</a>

    {% if schedules %}
        {% for s in schedules %}
        <div class="card mb-2 p-3">
            <div>日期：{{ s.date }}</div>
            <div>时段：第{{ s.slot }}时段</div>
            <div>状态：<span class="text-success">已排定</span></div>
            <div class="mt-2">
                <form action="/staff_leave_apply/{{ s.id }}" method="post" class="d-inline">
                    <button class="btn btn-sm btn-warning">申请请假</button>
                </form>
                <a href="/staff_change_select/{{ s.id }}" class="btn btn-sm btn-info">申请换班</a>
            </div>
        </div>
        {% endfor %}
    {% else %}
        <div class="alert alert-info">暂无当前时段内排班，新排班发布后自动同步展示</div>
    {% endif %}
</body>
</html>
