<!DOCTYPE html>
<html>
<head>
    <title>管理中心</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-3">
    <div class="d-flex justify-content-between">
        <h3>管理员中心</h3>
        <a href="/logout" class="btn btn-danger">退出登录</a>
    </div>
    <hr>
    <!-- 1. 员工管理+Excel导入 -->
    <h5>👥 员工管理</h5>
    <form action="/import_users" method="post" enctype="multipart/form-data" class="mb-2">
        <input type="file" name="file" accept=".xlsx" required>
        <button class="btn btn-success">导入Excel员工</button>
    </form>
    <a href="/generate_schedule" class="btn btn-primary mb-3">生成排班表</a>
    <hr>
    <!-- 2. 审批中心 -->
    <h5>✅ 换班/请假审批</h5>
    {% for req in requests %}
    <div class="border p-2 mb-2">
        申请人：{{ req.applicant_id | user_name }} | 类型：{{ req.type }} | 状态：{{ req.status }}
        <a href="/approve_request/{{ req.id }}/通过" class="btn btn-sm btn-success">通过</a>
        <a href="/approve_request/{{ req.id }}/拒绝" class="btn btn-sm btn-danger">拒绝</a>
    </div>
    {% endfor %}
    <hr>
    <!-- 3. 排班统计 -->
    <h5>📊 值班次数统计</h5>
    <table class="table table-sm">
        <tr><th>姓名</th><th>组别</th><th>总值班次数</th></tr>
        {% for s in stats %}
        <tr><td>{{ s.user_id | user_name }}</td><td>{{ s.group }}</td><td>{{ s.total_count }}</td></tr>
        {% endfor %}
    </table>
</body>
</html>
