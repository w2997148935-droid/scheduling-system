<!DOCTYPE html>
<html>
<head>
    <title>全体人员</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>全体人员</h3>
        <a href="/admin" class="btn btn-primary">返回后台</a>
    </div>

    <!-- 检索 -->
    <form action="/search_users" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control" placeholder="搜索姓名/账号/分组" value="{{keyword}}">
            <button class="btn btn-info">检索</button>
        </div>
    </form>

    <!-- 导入 -->
    <div class="card mb-3">
        <div class="card-header">Excel导入员工</div>
        <div class="card-body">
            <form method="post" action="/import_users" enctype="multipart/form-data">
                <input type="file" name="file" accept=".xlsx" class="form-control mb-2" required>
                <button class="btn btn-success">导入</button>
            </form>
        </div>
    </div>

    {% for u in users %}
    <div class="border p-3 mb-3">
        <div><strong>姓名：</strong>{{u.name}}</div>
        <div><strong>账号：</strong>{{u.username}}</div>
        <div><strong>分组：</strong>{{u.group}}</div>
        <div><strong>角色：</strong>{{u.role}}</div>
        <div><strong>值班次数：</strong>{{count_data.get(u.id,0)}}</div>
        <hr>
        <div class="d-flex gap-2 flex-wrap">
            {% if u.role != 'admin' %}
                <a href="/set_admin/{{u.id}}" class="btn btn-sm btn-warning">设为管理员</a>
            {% else %}
                <a href="/unset_admin/{{u.id}}" class="btn btn-sm btn-danger">取消管理员</a>
            {% endif %}

            <form method="post" action="/set_group/{{u.id}}" class="d-inline-flex gap-1">
                <input type="text" name="group" class="form-control form-control-sm" placeholder="分组" value="{{u.group}}">
                <button class="btn btn-sm btn-secondary">保存分组</button>
            </form>

            <a href="/delete_user/{{u.id}}" class="btn btn-sm btn-danger" onclick="return confirm('确定删除？')">删除</a>
        </div>
    </div>
    {% endfor %}
</body>
</html>
