<!DOCTYPE html>
<html>
<head>
    <title>值班次数统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h3>值班次数统计</h3>
    <a href="/admin" class="btn btn-sm btn-primary mb-3">返回后台</a>

    {% for u in users %}
    <div class="border p-2 mb-2">
        {{ u.name }}：{{ user_count.get(u.id, 0) }} 次
    </div>
    {% endfor %}
</body>
</html>
