<!DOCTYPE html>
<html>
<head>
    <title>值班统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>值班统计</h3>
        <a href="/admin" class="btn btn-primary">返回后台</a>
        <a href="/reset_stats" class="btn btn-danger" onclick="return confirm('确定要清空所有值班次数吗？此操作不可恢复！')">清空所有值班次数</a>
    </div>

    <form action="/search_stats" method="get" class="mb-3">
        <div class="input-group">
            <input type="text" name="keyword" class="form-control" placeholder="搜索姓名/分组" value="{{keyword}}">
            <button class="btn btn-info">检索</button>
        </div>
    </form>

    {% for u in users %}
    <div class="border p-2 mb-2">
        {{u.name}} ({{u.group}})：{{count_data.get(u.id,0)}} 次
    </div>
    {% endfor %}
</body>
</html>
