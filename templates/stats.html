<!DOCTYPE html>
<html>
<head>
    <title>值班次数统计</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>值班次数统计</h3>
        <a href="/admin" class="btn btn-primary btn-sm">返回管理员后台</a>
    </div>

    {% for s in stats %}
    <div class="border p-3 mb-2">
        {{ user_dict[s.user_id] }}：{{ s.count }} 次值班
    </div>
    {% else %}
    <div class="alert alert-info">暂无排班统计数据</div>
    {% endfor %}
</body>
</html>
